<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - DeadlineZone</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="auth-body">

  <div class="auth-card">
    <div class="auth-logo">
      <span class="logo-icon">&#9201;</span>
      <span class="logo-text">DeadlineZone</span>
    </div>
    <h1 class="auth-title">Create an account</h1>
    <p class="auth-subtitle">Start tracking your assignments today</p>

    <div class="alert alert-error hidden" id="register-error"></div>

    <form id="register-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="username">Full Name</label>
        <input type="text" id="username" name="username" class="form-input"
          placeholder="Your full name" required data-testid="input-username" />
        <span class="field-error hidden" id="username-error">Name is required.</span>
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input type="email" id="email" name="email" class="form-input"
          placeholder="your@email.com" required data-testid="input-email" />
        <span class="field-error hidden" id="email-error">Valid email is required.</span>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password <span class="text-muted">(min 6 characters)</span></label>
        <input type="password" id="password" name="password" class="form-input"
          placeholder="Choose a strong password" required minlength="6" data-testid="input-password" />
        <span class="field-error hidden" id="password-error">Password must be at least 6 characters.</span>
      </div>

      <button type="submit" class="btn btn-primary btn-full" id="register-btn" data-testid="button-register">
        Create Account
      </button>
    </form>

    <p class="auth-switch">
      Already have an account? <a href="/login.html" class="auth-link">Log in here</a>
    </p>
  </div>

  <script src="/js/auth.js"></script>
</body>
</html>
