<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile - DeadlineZone</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="header">
    <div class="header-inner">
      <a href="/" class="logo">
        <span class="logo-icon">&#9201;</span>
        <span class="logo-text">DeadlineZone</span>
      </a>
      <nav class="nav">
        <a href="/" class="nav-link" data-testid="nav-dashboard">Dashboard</a>
        <a href="/add.html" class="nav-link" data-testid="nav-add">+ Add</a>
        <a href="/profile.html" class="nav-link active" data-testid="nav-profile">Profile</a>
        <button class="nav-btn-logout" id="logout-btn" data-testid="button-logout">Logout</button>
      </nav>
    </div>
  </header>

  <main class="main main-narrow">

    <!-- Loading state -->
    <div class="loading-overlay" id="loading-overlay">
      <div class="spinner"></div>
    </div>

    <!-- Profile content (hidden while loading) -->
    <div class="hidden" id="profile-content">

      <!-- Avatar + name -->
      <div class="profile-hero">
        <div class="avatar" id="profile-avatar"></div>
        <div>
          <h1 class="profile-name" id="profile-name">--</h1>
          <p class="profile-email" id="profile-email">--</p>
          <p class="profile-joined text-muted" id="profile-joined">--</p>
        </div>
      </div>

      <!-- Stats -->
      <h2 class="section-title">Your Assignment Stats</h2>
      <div class="profile-stats">
        <div class="stat-card stat-total">
          <div class="stat-label">TOTAL</div>
          <div class="stat-number" id="profile-stat-total">--</div>
        </div>
        <div class="stat-card stat-pending">
          <div class="stat-label">PENDING</div>
          <div class="stat-number" id="profile-stat-pending">--</div>
        </div>
        <div class="stat-card stat-done">
          <div class="stat-label">DONE</div>
          <div class="stat-number" id="profile-stat-done">--</div>
        </div>
      </div>

      <!-- Completion progress -->
      <div class="form-card" style="margin-top:1.5rem;">
        <h3 style="font-weight:700; margin-bottom:0.75rem;">Completion Rate</h3>
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
        </div>
        <p class="text-muted" style="margin-top:0.5rem; font-size:0.85rem;">
          <span id="progress-text">0 of 0 assignments completed</span>
        </p>
      </div>

      <!-- Account info -->
      <div class="form-card" style="margin-top:1.5rem;">
        <h3 style="font-weight:700; margin-bottom:1rem;">Account Information</h3>
        <div class="info-row">
          <span class="info-label">Full Name</span>
          <span class="info-value" id="info-name">--</span>
        </div>
        <div class="info-row">
          <span class="info-label">Email</span>
          <span class="info-value" id="info-email">--</span>
        </div>
        <div class="info-row">
          <span class="info-label">Member Since</span>
          <span class="info-value" id="info-since">--</span>
        </div>
        <div style="margin-top:1.25rem;">
          <a href="/" class="btn btn-outline">Back to Dashboard</a>
        </div>
      </div>

    </div>
  </main>

  <script src="/js/auth.js"></script>
</body>
</html>
